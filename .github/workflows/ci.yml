name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --workspace backend

      - name: Check syntax
        run: node --input-type=module < /dev/null
        working-directory: backend

      - name: Verify server starts
        run: |
          timeout 10 node src/server.js &
          sleep 3
          curl -f http://localhost:5055/api/health || exit 1
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5055

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --workspace frontend

      - name: Build
        run: npm run build --workspace frontend
        env:
          VITE_API_URL: http://localhost:5055/api

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t tuti-backend ./backend

      - name: Build frontend image
        run: docker build -t tuti-frontend ./frontend
