<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tuti — Luxury perfumes, cakes, and beautifully crafted gift sets. Cash on delivery available." />

    <!-- Open Graph / social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Tuti" />
    <meta property="og:title"       content="Tuti — Luxury Perfumes, Cakes &amp; Gift Sets" />
    <meta property="og:description" content="Luxury perfumes, cakes, and beautifully crafted gift sets. Cash on delivery available." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:url"         content="https://tuti.ae/" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Tuti — Luxury Perfumes, Cakes &amp; Gift Sets" />
    <meta name="twitter:description" content="Luxury perfumes, cakes, and beautifully crafted gift sets. Cash on delivery available." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Canonical (overridden per-page by useSeoMeta hook) -->
    <link rel="canonical" href="https://tuti.ae/" />

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tuti",
      "url": "https://tuti.ae/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tuti.ae/shop?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <title>Tuti</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
